<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode / QR Code Generator</title>
</head>
<body>
  <header>
    <h1>Barcode / QR Code Generator</h1>
    <div class="controls">
      <label><input type="radio" name="mode" value="barcode" checked /> Barcode (CODE128)</label>
      <label><input type="radio" name="mode" value="qr" /> QR Code</label>
      <button id="print" type="button">Print</button>
      <button id="download-all" type="button">Download all (ZIP)</button>
      <span id="status"></span>
    </div>
    <textarea id="data-input" rows="6"
      placeholder="Enter one value per line&#10;e.g.&#10;1234567890&#10;HELLO-WORLD"></textarea>
  </header>
  <main id="grid"></main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
