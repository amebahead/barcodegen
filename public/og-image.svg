    <rect x="74" y="0" width="4" height="120"/>
    <rect x="84" y="0" width="6" height="120"/>
    <rect x="96" y="0" width="4" height="120"/>
    <rect x="106" y="0" width="8" height="120"/>
    <rect x="120" y="0" width="4" height="120"/>
